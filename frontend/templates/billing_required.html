<!DOCTYPE html>
<html>
<head>
    <title>Subscription Required</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page">
        <nav class="topbar">
            <div class="logo">Dealership Scanner</div>
            <div class="nav-links">
                <a href="/logout">Logout</a>
            </div>
        </nav>

        <section class="auth-section">
            <div class="auth-card">
                <p class="eyebrow">Billing</p>
                <h1>Subscription Required</h1>
                <p style="margin-top: 8px; color: #5a5a5a;">
                    Your organization{% if org and org.name %} (<strong>{{ org.name }}</strong>){% endif %} needs an active subscription to access the dealer portal.
                </p>
                <div style="margin-top: 18px;">
                    <a class="primary-button full-width" href="{{ url_for('billing.billing_checkout') }}">Start subscription</a>
                </div>
                <p class="auth-footer" style="margin-top: 14px;">
                    If you already subscribed, refresh this page after a few seconds.
                </p>
            </div>
        </section>
    </div>
</body>
</html>
