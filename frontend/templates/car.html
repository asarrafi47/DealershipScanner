<!DOCTYPE html>
<html>
<head>
    <title>{{ car.title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="page">

        <nav class="topbar">
            <div class="logo">Dealership Scanner</div>
            <div class="nav-links">
                <a href="/dashboard">Dashboard</a>
                <a href="/listings">Listings</a>
                <a href="/login">Logout</a>
            </div>
        </nav>

        <section class="car-detail">

            <a href="javascript:history.back()" class="back-link">← Back to results</a>

            <div class="car-detail-layout">

                <div class="car-detail-image" style="background-image: url('{{ car.image_url }}')"></div>

                <div class="car-detail-info">
                    <p class="eyebrow">{{ car.dealer_name }}</p>
                    <h1>{{ car.title }}</h1>
                    <p class="car-detail-price">${{ "{:,.0f}".format(car.price) }}</p>

                    <div class="car-specs">
                        <div class="spec-row">
                            <span class="spec-label">Year</span>
                            <span class="spec-value">{{ car.year }}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Make</span>
                            <span class="spec-value">{{ car.make }}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Model</span>
                            <span class="spec-value">{{ car.model }}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">VIN</span>
                            <span class="spec-value">{{ car.vin }}</span>
                        </div>
                        <div class="spec-row">
                            <span class="spec-label">Zip Code</span>
                            <span class="spec-value">{{ car.zip_code }}</span>
                        </div>
                    </div>

                    <div class="car-detail-actions">
                        <a href="{{ car.dealer_url }}" target="_blank" class="primary-button">View at Dealership</a>
                    </div>
                </div>

            </div>

        </section>

    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
